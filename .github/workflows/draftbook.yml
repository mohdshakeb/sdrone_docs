name: Draftbook Capture

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to capture"
        required: true

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Draftbook capture
        run: |
          curl -sSL "${DRAFTBOOK_API_URL}/capture-action.mjs" -o /tmp/capture.mjs
          node /tmp/capture.mjs
        env:
          DRAFTBOOK_PROJECT_ID: ${{ secrets.DRAFTBOOK_PROJECT_ID }}
          DRAFTBOOK_API_KEY: ${{ secrets.DRAFTBOOK_API_KEY }}
          DRAFTBOOK_API_URL: http://localhost:3000
          GITHUB_SHA: ${{ github.event.inputs.commit_sha }}
